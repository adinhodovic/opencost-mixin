"groups":
- "name": "opencost"
  "rules":
  - "alert": "OpenCostMonthlyBudgetExceeded"
    "annotations":
      "dashboard_url": "https://grafana.com/d/opencost-mixin-kover-jkwq/opencost-overview"
      "description": "The monthly budget for the cluster has been exceeded. Consider scaling down resources or increasing the budget."
      "summary": "OpenCost Monthly Budget Exceeded"
    "expr": |
      (
        sum(
          node_total_hourly_cost{
            job="opencost"
          }
        ) by (cluster) * 730
        or vector(0)
        +
        sum(
          sum(
            kube_persistentvolume_capacity_bytes{
              job="opencost"
            }
            / 1024 / 1024 / 1024
          ) by (cluster, persistentvolume)
          *
          sum(
            pv_hourly_cost{
              job="opencost"
            }
          ) by (cluster, persistentvolume)
        ) * 730
        or vector(0)
      )
      > 200
    "for": "30m"
    "labels":
      "severity": "warning"
  - "alert": "OpenCostAnomalyDetected"
    "annotations":
      "dashboard_url": "https://grafana.com/d/opencost-mixin-kover-jkwq/opencost-overview"
      "description": "A significant increase in cluster costs has been detected. The average hourly cost over the 3 hours exceeds the 7-day average by more than 15%. This could indicate unexpected resource usage or cost-related changes in the cluster."
      "summary": "OpenCost Cost Anomaly Detected"
    "expr": |
      (
        (
          (
            avg_over_time(
              sum(
                node_total_hourly_cost{
                  job="opencost"
                }
              ) by (cluster) [3h:30m]
            )
            or vector(0)
          )
          +
          (
            avg_over_time(
              sum(
                (
                  kube_persistentvolume_capacity_bytes{
                    job="opencost"
                  } / 1024 / 1024 / 1024
                )
                * on (cluster, persistentvolume)
                group_left()
                pv_hourly_cost{
                  job="opencost"
                }
              ) by (cluster) [3h:30m]
            )
            or vector(0)
          )
        )
        -
        (
          (
            avg_over_time(
              sum(
                node_total_hourly_cost{
                  job="opencost"
                }
              ) by (cluster) [7d:30m]
            )
            or vector(0)
          )
          +
          (
            avg_over_time(
              sum(
                (
                  kube_persistentvolume_capacity_bytes{
                    job="opencost"
                  } / 1024 / 1024 / 1024
                )
                * on (cluster, persistentvolume)
                group_left()
                pv_hourly_cost{
                  job="opencost"
                }
              ) by (cluster) [7d:30m]
            )
            or vector(0)
          )
        )
      )
      /
      (
        (
          (
            avg_over_time(
              sum(
                node_total_hourly_cost{
                  job="opencost"
                }
              ) by (cluster) [7d:30m]
            )
            or vector(0)
          )
          +
          (
            avg_over_time(
              sum(
                (
                  kube_persistentvolume_capacity_bytes{
                    job="opencost"
                  } / 1024 / 1024 / 1024
                )
                * on (cluster, persistentvolume)
                group_left()
                pv_hourly_cost{
                  job="opencost"
                }
              ) by (cluster) [7d:30m]
            )
            or vector(0)
          )
        )
      )
      > (15 / 100)
    "for": "10m"
    "labels":
      "severity": "warning"
- "name": "opencost-efficiency"
  "rules":
  - "alert": "OpenCostLowEfficiencyNamespace"
    "annotations":
      "dashboard_url": "https://grafana.com/d/opencost-mixin-namespace-jkwq/opencost-namespace"
      "description": "Total CPU+RAM cost-weighted efficiency for namespace {{ $labels.namespace }} on cluster {{ $labels.cluster }} has averaged {{ $value | humanizePercentage }} over the last 7 days while projected monthly cost exceeds $500. Consider rightsizing container requests. Formula mirrors OpenCost allocation.go (CPUEfficiency, RAMEfficiency, TotalEfficiency) — spec at https://www.opencost.io/docs/specification#efficiency."
      "summary": "Namespace {{ $labels.namespace }} on {{ $labels.cluster }} is chronically under-utilizing its requests"
    "expr": |
      avg_over_time(namespace:efficiency_total:ratio[7d]) < 0.20000000000000001
      and
      (
        avg_over_time(namespace:opencost_cpu_cost:sum[7d])
        + avg_over_time(namespace:opencost_ram_cost:sum[7d])
      ) * 730 > 500
    "for": "1h"
    "labels":
      "severity": "info"
