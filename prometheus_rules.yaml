"groups":
- "interval": "5m"
  "name": "opencost.rules.efficiency"
  "rules":
  - "expr": |
      sum by (cluster, namespace) (
        rate(container_cpu_usage_seconds_total{job="kube-system/cadvisor", container!="", image!=""}[5m])
      )
      /
      sum by (cluster, namespace) (
        container_cpu_allocation{job="opencost"}
      )
    "record": "namespace:efficiency_cpu:ratio"
  - "expr": |
      sum by (cluster, namespace) (
        container_memory_working_set_bytes{job="kube-system/cadvisor", container!="", image!=""}
      )
      /
      sum by (cluster, namespace) (
        container_memory_allocation_bytes{job="opencost"}
      )
    "record": "namespace:efficiency_ram:ratio"
  - "expr": "sum by (cluster, namespace) (workload:opencost_cpu_cost:sum)"
    "record": "namespace:opencost_cpu_cost:sum"
  - "expr": "sum by (cluster, namespace) (workload:opencost_ram_cost:sum)"
    "record": "namespace:opencost_ram_cost:sum"
  - "expr": |
      (
        namespace:opencost_cpu_cost:sum * namespace:efficiency_cpu:ratio
        +
        namespace:opencost_ram_cost:sum * namespace:efficiency_ram:ratio
      )
      /
      (
        namespace:opencost_cpu_cost:sum + namespace:opencost_ram_cost:sum
      )
    "record": "namespace:efficiency_total:ratio"
  - "expr": |
      sum by (cluster, namespace, workload_type, workload) (
        rate(container_cpu_usage_seconds_total{job="kube-system/cadvisor", container!="", image!=""}[5m])
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
      /
      sum by (cluster, namespace, workload_type, workload) (
        container_cpu_allocation{job="opencost"}
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
    "record": "workload:efficiency_cpu:ratio"
  - "expr": |
      sum by (cluster, namespace, workload_type, workload) (
        container_memory_working_set_bytes{job="kube-system/cadvisor", container!="", image!=""}
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
      /
      sum by (cluster, namespace, workload_type, workload) (
        container_memory_allocation_bytes{job="opencost"}
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
    "record": "workload:efficiency_ram:ratio"
  - "expr": |
      (
        workload:opencost_cpu_cost:sum * workload:efficiency_cpu:ratio
        +
        workload:opencost_ram_cost:sum * workload:efficiency_ram:ratio
      )
      /
      (
        workload:opencost_cpu_cost:sum + workload:opencost_ram_cost:sum
      )
    "record": "workload:efficiency_total:ratio"
- "interval": "5m"
  "name": "opencost.rules.workload"
  "rules":
  - "expr": |
      sum by (cluster, namespace, workload_type, workload) (
        (
          sum by (cluster, namespace, pod, instance) (container_memory_allocation_bytes)
          * on(cluster, instance) group_left()
          (avg by (cluster, instance) (node_ram_hourly_cost) / 1024 / 1024 / 1024)
        )
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
    "record": "workload:opencost_ram_cost:sum"
  - "expr": |
      sum by (cluster, namespace, workload_type, workload) (
        (
          sum by (cluster, namespace, pod, instance) (container_cpu_allocation)
          * on(cluster, instance) group_left()
          avg by (cluster, instance) (node_cpu_hourly_cost)
        )
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
    "record": "workload:opencost_cpu_cost:sum"
  - "expr": |
      sum by (cluster, namespace, persistentvolumeclaim, workload_type, workload) (
        max by (cluster, namespace, persistentvolumeclaim, workload_type, workload) (
          max by (cluster, namespace, pod, persistentvolumeclaim) (kube_pod_spec_volumes_persistentvolumeclaims_info{job="kube-state-metrics"})
          * on(cluster, namespace, pod) group_left(workload_type, workload)
          max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
        )
        * on(cluster, namespace, persistentvolumeclaim) group_left()
        sum by (cluster, namespace, persistentvolumeclaim) (
          (
            sum by (cluster, persistentvolume) (kube_persistentvolume_capacity_bytes{job="kube-state-metrics"} / 1024 / 1024 / 1024)
            * sum by (cluster, persistentvolume) (pv_hourly_cost)
          )
          * on(cluster, persistentvolume) group_left(persistentvolumeclaim, namespace)
          max by (cluster, persistentvolume, persistentvolumeclaim, namespace) (
            label_replace(kube_persistentvolumeclaim_info{job="kube-state-metrics"}, "persistentvolume", "$1", "volumename", "(.*)")
          )
        )
      )
    "record": "workload:opencost_pvc_cost:sum"
  - "expr": |
      sum by (cluster, namespace, workload_type, workload) (
        (
          sum by (cluster, namespace, pod, instance) (container_gpu_allocation)
          * on(cluster, instance) group_left()
          avg by (cluster, instance) (node_gpu_hourly_cost)
        )
        * on(cluster, namespace, pod) group_left(workload_type, workload)
        max by (cluster, namespace, pod, workload_type, workload) (namespace_workload_pod:kube_pod_owner:relabel)
      )
    "record": "workload:opencost_gpu_cost:sum"
